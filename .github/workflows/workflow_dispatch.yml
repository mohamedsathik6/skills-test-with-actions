name: dispatch
on:
  workflow_dispatch:
    inputs: 
      logLevel:
        description: "Log level"
        type: choice
        options:
          - debug
          - info
          - warning
          - error
        default: "info"
        required: true
      environment:
        description: "Environment to deploy to"
        type: environment
        required: true

jobs:
  log-the-inputs:
    runs-on: self-hosted
    strategy:                             
      matrix:
        version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - run: |
          echo "Log level: $LEVEL"
          echo "Environment: $ENVIRONMENT"
        env:
          LEVEL: ${{ inputs.logLevel }}
          ENVIRONMENT: ${{ inputs.environment }}
