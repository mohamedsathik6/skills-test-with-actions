# This is a basic workflow to help you get started with Actions

name: passing job values

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
jobs:
  pass_in_one_job:
    runs-on: ubuntu-latest
    steps:
      - name: Set color
        id: color-selector
        run: echo "COLOR=green" >> "$GITHUB_ENV"
      - name: Get color
        run: echo "The selected color is $COLOR"
        
  producer:
    runs-on: ubuntu-latest
    outputs:
      message: ${{ steps.sentence_maker.outputs.message }}
    steps:
      - name: Make a sentence
        id: sentence_maker
        run: |
            echo "message=Hello from producer job" >> "$GITHUB_OUTPUT"

  consumer:
    needs: [producer]
    runs-on: ubuntu-latest
    env:
      message: ${{ needs.producer.outputs.message }}
    steps:
      - name: Print the message
        run: |
          echo $message

  job_1:
    name: Add 3 and 7
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          expr 3 + 7 > math-homework.txt
      - name: Upload math result
        uses: actions/upload-artifact@v4
        with:
          name: homework
          path: math-homework.txt

  job_2:
    name: Multiply by 9
    needs: job_1
    runs-on: windows-latest
    steps:
      - name: Download math result
        uses: actions/download-artifact@v4
        with:
          name: homework
      - shell: bash
        run: |
          value=`cat math-homework.txt`
          echo $(expr $value \* 9) 